name: Build SuperB (B-field POSTI tool)

# Verify the repo contains everything needed to build the SuperB POSTI
# tool — the magnetic-field pre-processor that computes B-fields from
# coils and permanent magnets and writes the result as a background-field
# HDF5 file consumed by subsequent PICLas runs (PIC-BG-Field = T).
# CPU-only, no CUDA needed.

on:
  push:
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/build-superb.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
  workflow_dispatch:
  workflow_call:
    inputs:
      preset:
        description: 'CMake configure/build preset'
        type: string
        required: false
      build_dir:
        description: 'CMake binary directory for the preset'
        type: string
        required: false
      artifact_name:
        description: 'Name for the uploaded bundle artifact'
        type: string
        required: false

permissions:
  contents: read

jobs:
  build:
    name: SuperB (Windows / MSYS2-UCRT64)
    runs-on: windows-2022
    timeout-minutes: 45

    # Default to the MPI superB preset; release.yml overrides these to also build
    # the no-MPI (serial) variant. The '|| default' fallback keeps push /
    # pull_request CI runs (empty inputs context) building the MPI one.
    env:
      PRESET:    ${{ inputs.preset        || 'windows-maxwell-superb-mpi' }}
      BUILD_DIR: ${{ inputs.build_dir     || 'build-maxwell-superb-mpi' }}
      ARTIFACT:  ${{ inputs.artifact_name || 'superB-win64' }}

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install MSYS2 UCRT64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gcc-fortran
            mingw-w64-ucrt-x86_64-gcc-libgfortran
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-hdf5
            mingw-w64-ucrt-x86_64-openblas
            mingw-w64-ucrt-x86_64-msmpi
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-python

      # Override the C:/msys64/... hardcoded developer paths in the base
      # preset with the runner's actual MSYS2 install prefix.
      - name: CMake configure
        run: |
          export PATH="/ucrt64/bin:/usr/bin:$PATH"
          which gfortran
          gfortran --version | head -1
          PREFIX=$(cygpath -m "$MINGW_PREFIX")
          echo "MSYS2 UCRT64 prefix (Windows form): $PREFIX"
          cmake --preset "$PRESET" \
            -DCMAKE_MAKE_PROGRAM="$PREFIX/bin/ninja.exe"                    \
            -DCMAKE_C_COMPILER="$PREFIX/bin/gcc.exe"                        \
            -DCMAKE_CXX_COMPILER="$PREFIX/bin/g++.exe"                      \
            -DCMAKE_Fortran_COMPILER="$PREFIX/bin/gfortran.exe"             \
            -DCMAKE_PREFIX_PATH="$PREFIX"                                   \
            -DHDF5_ROOT="$PREFIX"                                           \
            -DHDF5_DIR="$PREFIX/lib/cmake/hdf5"                             \
            -DHDF5_Fortran_INCLUDE_DIR="$PREFIX/include"                    \
            -DLAPACK_ROOT="$PREFIX"                                         \
            -DMPI_HOME="$PREFIX"                                            \
            -DMPI_C_COMPILER="$PREFIX/bin/mpicc"                            \
            -DMPI_CXX_COMPILER="$PREFIX/bin/mpicxx"                         \
            -DMPI_Fortran_COMPILER="$PREFIX/bin/mpifort"                    \
            -DPICLAS_UNITTESTS=OFF

      - name: Build superB target
        run: |
          export PATH="/ucrt64/bin:/usr/bin:$PATH"
          cmake --build "$BUILD_DIR" --target superB -j

      - name: Verify binary exists
        shell: cmd
        run: |
          dir %BUILD_DIR%\bin
          if not exist %BUILD_DIR%\bin\superB.exe (exit /b 1)

      - name: Bundle runtime DLLs
        run: |
          export PATH="/ucrt64/bin:/usr/bin:$PATH"
          bash .github/scripts/bundle_dlls.sh \
            "$BUILD_DIR/bin/superB.exe" \
            dist/superB

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: dist/superB
          if-no-files-found: error
          retention-days: 14
