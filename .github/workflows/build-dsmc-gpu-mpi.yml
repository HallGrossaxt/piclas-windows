name: Build DSMC + MPI + GPU

# Verify the repo contains everything needed to build the DSMC + MPI + GPU
# binary.  The binary links against the CUDA runtime; runtime execution of
# the GPU code path is NOT exercised here because GitHub-hosted runners have
# no NVIDIA device.

on:
  push:
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/build-dsmc-gpu-mpi.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
  workflow_dispatch:
  workflow_call:
    inputs:
      preset:
        description: 'CMake configure/build preset'
        type: string
        required: false
      build_dir:
        description: 'CMake binary directory for the preset'
        type: string
        required: false
      artifact_name:
        description: 'Name for the uploaded bundle artifact'
        type: string
        required: false
      cpu_only:
        description: 'Build WITHOUT CUDA GPU support (CPU-only fallback). Default false = GPU build.'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  build:
    name: DSMC solver (Windows / MSYS2-UCRT64, +CUDA when gpu=true)
    runs-on: windows-2022
    timeout-minutes: 90

    # Defaults to the MPI + GPU preset; release.yml overrides these to also build
    # the CPU-only (cpu_only=true) fallback. On push/PR the inputs context is empty,
    # so inputs.cpu_only is null (falsy) -> GPU build, matching the default.
    # NOTE: decide via truthiness (inputs.cpu_only / !inputs.cpu_only), NOT '!= false'.
    # A prior 'gpu' input with 'inputs.gpu != false' broke push builds: on push
    # inputs.gpu is null and GitHub coerces 'null != false' to FALSE, which disabled
    # CUDA install while still selecting the GPU preset -> nvcc-not-found configure fail.
    env:
      PRESET:    ${{ inputs.preset        || 'windows-maxwell-dsmc-release-mpi-gpu' }}
      BUILD_DIR: ${{ inputs.build_dir     || 'build-maxwell-dsmc-release-mpi-gpu' }}
      ARTIFACT:  ${{ inputs.artifact_name || 'piclas-win-win64' }}
      GPU:       ${{ inputs.cpu_only && 'false' || 'true' }}    # 'false' only when explicitly cpu_only=true

    defaults:
      run:
        shell: msys2 {0}

    steps:
      # ------------------------------------------------------------------ #
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      # ------------------------------------------------------------------ #
      - name: Install MSYS2 UCRT64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gcc-fortran
            mingw-w64-ucrt-x86_64-gcc-libgfortran
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-hdf5
            mingw-w64-ucrt-x86_64-openblas
            mingw-w64-ucrt-x86_64-msmpi
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-python

      # ------------------------------------------------------------------ #
      # Install the redistributable MS-MPI runtime so bundle_dlls.sh ships
      # msmpi.dll in the zip (lets it run single-process with NO MS-MPI install).
      - name: Install MS-MPI runtime
        shell: pwsh
        run: |
          $url = 'https://github.com/microsoft/Microsoft-MPI/releases/download/v10.1.1/msmpisetup.exe'
          $exe = Join-Path $env:RUNNER_TEMP 'msmpisetup.exe'
          Invoke-WebRequest -Uri $url -OutFile $exe
          Start-Process -FilePath $exe -ArgumentList '-unattend' -Wait
          $dll = Join-Path $env:SystemRoot 'System32\msmpi.dll'
          if (-not (Test-Path $dll)) { throw "msmpi.dll not found after install" }
          Write-Host "MS-MPI runtime: $((Get-Item $dll).VersionInfo.FileVersion)"

      # ------------------------------------------------------------------ #
      - name: Verify MSVC cl.exe is available (CUDA host compiler)
        if: ${{ !inputs.cpu_only }}
        shell: cmd
        run: |
          dir "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC" 2>nul || ^
          dir "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Tools\MSVC" 2>nul || ^
          dir "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Tools\MSVC" 2>nul

      # ------------------------------------------------------------------ #
      # CUDA Toolkit — needed for nvcc.  Any 12.x or 13.x version works; the
      # CMake build resolves the matching cudart runtime DLL via
      # CUDAToolkit_VERSION_MAJOR.  RTX 3060 ⇒ compute capability 8.6.
      # ------------------------------------------------------------------ #
      - name: Install CUDA Toolkit
        if: ${{ !inputs.cpu_only }}
        uses: Jimver/cuda-toolkit@v0.2.21
        id: cuda-toolkit
        with:
          cuda: '12.4.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "thrust"]'
          use-github-cache: true

      - name: Verify CUDA + nvcc
        if: ${{ !inputs.cpu_only }}
        shell: cmd
        run: |
          where nvcc
          nvcc --version

      # ------------------------------------------------------------------ #
      # Configure via the new CMakePresets entry that bundles all the
      # DSMC + MPI + GPU binary flags (DSMC + MPI + GPU + UNITTESTS=OFF).
      # ------------------------------------------------------------------ #
      # The base preset 'windows-ucrt64' hardcodes C:/msys64/ucrt64 absolute
      # paths matching a local developer install.  On the runner MSYS2 may
      # live elsewhere; resolve $MINGW_PREFIX at runtime and override the
      # hardcoded path entries so the preset works regardless of install root.
      - name: CMake configure
        run: |
          export PATH="/ucrt64/bin:/usr/bin:$PATH"
          which gfortran
          gfortran --version | head -1
          PREFIX=$(cygpath -m "$MINGW_PREFIX")
          echo "MSYS2 UCRT64 prefix (Windows form): $PREFIX"
          # Build extra args in an array so the nvcc path (which contains spaces,
          # e.g. C:/Program Files/NVIDIA GPU Computing Toolkit/...) stays a single
          # argument. An unquoted string here word-splits and CMake misreads the
          # tail as a stray preset path ("Could not read presets from .../Files/NVIDIA").
          EXTRA=()
          if [ "$GPU" = "true" ]; then
            NVCC=$(cygpath -m "$CUDA_PATH")/bin/nvcc.exe
            echo "nvcc : $NVCC"
            test -x "$NVCC" || { echo "nvcc not at expected path"; ls "$(cygpath -m "$CUDA_PATH")/bin/"; exit 1; }
            EXTRA+=(-DCMAKE_CUDA_COMPILER="$NVCC")
          else
            echo "GPU disabled — CPU-only fallback build"
          fi
          cmake --preset "$PRESET" \
            "${EXTRA[@]}"                                                   \
            -DCMAKE_MAKE_PROGRAM="$PREFIX/bin/ninja.exe"                    \
            -DCMAKE_C_COMPILER="$PREFIX/bin/gcc.exe"                        \
            -DCMAKE_CXX_COMPILER="$PREFIX/bin/g++.exe"                      \
            -DCMAKE_Fortran_COMPILER="$PREFIX/bin/gfortran.exe"             \
            -DCMAKE_PREFIX_PATH="$PREFIX"                                   \
            -DHDF5_ROOT="$PREFIX"                                           \
            -DHDF5_DIR="$PREFIX/lib/cmake/hdf5"                             \
            -DHDF5_Fortran_INCLUDE_DIR="$PREFIX/include"                    \
            -DLAPACK_ROOT="$PREFIX"                                         \
            -DMPI_HOME="$PREFIX"                                            \
            -DMPI_C_COMPILER="$PREFIX/bin/mpicc"                            \
            -DMPI_CXX_COMPILER="$PREFIX/bin/mpicxx"                         \
            -DMPI_Fortran_COMPILER="$PREFIX/bin/mpifort"

      # ------------------------------------------------------------------ #
      - name: Build piclas target only
        run: |
          export PATH="/ucrt64/bin:/usr/bin:$PATH"
          cmake --build "$BUILD_DIR" --target piclas -j

      # ------------------------------------------------------------------ #
      - name: Verify binaries exist
        shell: cmd
        run: |
          dir %BUILD_DIR%\bin
          if not exist %BUILD_DIR%\bin\piclas-win.exe (exit /b 1)
          if not exist %BUILD_DIR%\bin\libpiclas.dll (exit /b 1)
          if "%GPU%"=="true" if not exist %BUILD_DIR%\bin\libpiclasGPU.dll (exit /b 1)

      # ------------------------------------------------------------------ #
      # Assemble a self-contained, runnable bundle (binary + full UCRT64
      # runtime DLL closure + CUDA/MS-MPI runtime) so the artifact runs on a
      # clean Windows box without an MSYS2 install on PATH.
      - name: Bundle runtime DLLs
        run: |
          export PATH="/ucrt64/bin:/usr/bin:$PATH"
          bash .github/scripts/bundle_dlls.sh \
            "$BUILD_DIR/bin/piclas-win.exe" \
            dist/piclas-win

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: dist/piclas-win
          if-no-files-found: error
          retention-days: 14

      # ------------------------------------------------------------------ #
      # Note: gpu_loader.c's "cannot load libpiclasGPU.dll" error message
      # mentions cudart64_13.dll explicitly.  That's a cosmetic mismatch
      # when built against CUDA 12.x — the actual import name is whatever
      # the linked cudart runtime uses, picked up automatically by the IAT.
