name: Build DSMC + MPI + GPU

# Verify the repo contains everything needed to build the DSMC + MPI + GPU
# binary.  The binary links against the CUDA runtime; runtime execution of
# the GPU code path is NOT exercised here because GitHub-hosted runners have
# no NVIDIA device.

on:
  push:
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/build-dsmc-gpu-mpi.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: DSMC + MPI + GPU (Windows / MSYS2-UCRT64 + CUDA + MSVC)
    runs-on: windows-2022
    timeout-minutes: 90

    defaults:
      run:
        shell: msys2 {0}

    steps:
      # ------------------------------------------------------------------ #
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      # ------------------------------------------------------------------ #
      - name: Install MSYS2 UCRT64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gcc-fortran
            mingw-w64-ucrt-x86_64-gcc-libgfortran
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-hdf5
            mingw-w64-ucrt-x86_64-openblas
            mingw-w64-ucrt-x86_64-msmpi
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-python

      # ------------------------------------------------------------------ #
      - name: Verify MSVC cl.exe is available (CUDA host compiler)
        shell: cmd
        run: |
          dir "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC" 2>nul || ^
          dir "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Tools\MSVC" 2>nul || ^
          dir "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Tools\MSVC" 2>nul

      # ------------------------------------------------------------------ #
      # CUDA Toolkit — needed for nvcc.  Any 12.x or 13.x version works; the
      # CMake build resolves the matching cudart runtime DLL via
      # CUDAToolkit_VERSION_MAJOR.  RTX 3060 ⇒ compute capability 8.6.
      # ------------------------------------------------------------------ #
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.21
        id: cuda-toolkit
        with:
          cuda: '12.4.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "thrust"]'
          use-github-cache: true

      - name: Verify CUDA + nvcc
        shell: cmd
        run: |
          where nvcc
          nvcc --version

      # ------------------------------------------------------------------ #
      # Configure via the new CMakePresets entry that bundles all the
      # DSMC + MPI + GPU binary flags (DSMC + MPI + GPU + UNITTESTS=OFF).
      # ------------------------------------------------------------------ #
      # The base preset 'windows-ucrt64' hardcodes C:/msys64/ucrt64 absolute
      # paths matching a local developer install.  On the runner MSYS2 may
      # live elsewhere; resolve $MINGW_PREFIX at runtime and override the
      # hardcoded path entries so the preset works regardless of install root.
      - name: CMake configure
        run: |
          export PATH="/ucrt64/bin:/usr/bin:$PATH"
          which gfortran
          gfortran --version | head -1
          PREFIX=$(cygpath -m "$MINGW_PREFIX")
          NVCC=$(cygpath -m "$CUDA_PATH")/bin/nvcc.exe
          echo "MSYS2 UCRT64 prefix (Windows form): $PREFIX"
          echo "nvcc                              : $NVCC"
          test -x "$NVCC" || { echo "nvcc not at expected path"; ls "$(cygpath -m "$CUDA_PATH")/bin/"; exit 1; }
          cmake --preset windows-maxwell-dsmc-release-mpi-gpu \
            -DCMAKE_CUDA_COMPILER="$NVCC"                                   \
            -DCMAKE_MAKE_PROGRAM="$PREFIX/bin/ninja.exe"                    \
            -DCMAKE_C_COMPILER="$PREFIX/bin/gcc.exe"                        \
            -DCMAKE_CXX_COMPILER="$PREFIX/bin/g++.exe"                      \
            -DCMAKE_Fortran_COMPILER="$PREFIX/bin/gfortran.exe"             \
            -DCMAKE_PREFIX_PATH="$PREFIX"                                   \
            -DHDF5_ROOT="$PREFIX"                                           \
            -DHDF5_DIR="$PREFIX/lib/cmake/hdf5"                             \
            -DHDF5_Fortran_INCLUDE_DIR="$PREFIX/include"                    \
            -DLAPACK_ROOT="$PREFIX"                                         \
            -DMPI_HOME="$PREFIX"                                            \
            -DMPI_C_COMPILER="$PREFIX/bin/mpicc"                            \
            -DMPI_CXX_COMPILER="$PREFIX/bin/mpicxx"                         \
            -DMPI_Fortran_COMPILER="$PREFIX/bin/mpifort"

      # ------------------------------------------------------------------ #
      - name: Build piclas target only
        run: |
          export PATH="/ucrt64/bin:/usr/bin:$PATH"
          cmake --build build-maxwell-dsmc-release-mpi-gpu --target piclas -j

      # ------------------------------------------------------------------ #
      - name: Verify binaries exist
        shell: cmd
        run: |
          dir build-maxwell-dsmc-release-mpi-gpu\bin
          if not exist build-maxwell-dsmc-release-mpi-gpu\bin\piclas-win.exe (exit /b 1)
          if not exist build-maxwell-dsmc-release-mpi-gpu\bin\libpiclas.dll (exit /b 1)
          if not exist build-maxwell-dsmc-release-mpi-gpu\bin\libpiclasGPU.dll (exit /b 1)

      # ------------------------------------------------------------------ #
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: piclas-dsmc-gpu-mpi-win64-${{ github.sha }}
          path: |
            build-maxwell-dsmc-release-mpi-gpu/bin/piclas-win.exe
            build-maxwell-dsmc-release-mpi-gpu/bin/libpiclas.dll
            build-maxwell-dsmc-release-mpi-gpu/bin/libpiclasGPU.dll
            build-maxwell-dsmc-release-mpi-gpu/bin/cudart64_*.dll
          if-no-files-found: error
          retention-days: 14

      # ------------------------------------------------------------------ #
      # Note: gpu_loader.c's "cannot load libpiclasGPU.dll" error message
      # mentions cudart64_13.dll explicitly.  That's a cosmetic mismatch
      # when built against CUDA 12.x — the actual import name is whatever
      # the linked cudart runtime uses, picked up automatically by the IAT.
