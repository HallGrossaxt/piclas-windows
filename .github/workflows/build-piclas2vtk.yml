name: Build piclas2vtk (HDF5 → VTK POSTI tool)

# Verify the repo contains everything needed to build the piclas2vtk
# POSTI tool — converts PICLas State / DSMCState / PartStateBoundary
# HDF5 files to VTK so they can be opened in ParaView.  The build
# inherits the same DSMC settings as the DSMC + MPI + GPU binary so the
# resulting piclas2vtk can post-process DSMC case output.
# CPU-only, no CUDA needed.

on:
  push:
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/build-piclas2vtk.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
  workflow_dispatch:
  workflow_call:
    inputs:
      preset:
        description: 'CMake configure/build preset'
        type: string
        required: false
      build_dir:
        description: 'CMake binary directory for the preset'
        type: string
        required: false
      artifact_name:
        description: 'Name for the uploaded bundle artifact'
        type: string
        required: false

permissions:
  contents: read

jobs:
  build:
    name: piclas2vtk (Windows / MSYS2-UCRT64)
    runs-on: windows-2022
    timeout-minutes: 45

    # Default to the MPI POSTI preset; release.yml overrides these to also build
    # the no-MPI (serial) variant. The '|| default' fallback keeps push /
    # pull_request CI runs (empty inputs context) building the MPI one.
    env:
      PRESET:    ${{ inputs.preset        || 'windows-maxwell-dsmc-release-mpi-posti' }}
      BUILD_DIR: ${{ inputs.build_dir     || 'build-maxwell-dsmc-release-mpi-posti' }}
      ARTIFACT:  ${{ inputs.artifact_name || 'piclas2vtk-win64' }}

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install MSYS2 UCRT64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gcc-fortran
            mingw-w64-ucrt-x86_64-gcc-libgfortran
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-hdf5
            mingw-w64-ucrt-x86_64-openblas
            mingw-w64-ucrt-x86_64-msmpi
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-python

      # Install the redistributable MS-MPI runtime so bundle_dlls.sh ships
      # msmpi.dll in the zip (lets it run single-process with NO MS-MPI install).
      - name: Install MS-MPI runtime
        shell: pwsh
        run: |
          $url = 'https://github.com/microsoft/Microsoft-MPI/releases/download/v10.1.1/msmpisetup.exe'
          $exe = Join-Path $env:RUNNER_TEMP 'msmpisetup.exe'
          # Retry the download: the GitHub releases CDN occasionally drops the connection (transient).
          $ok = $false
          for ($i = 1; $i -le 5; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $exe -UseBasicParsing -TimeoutSec 120
              $ok = $true; break
            } catch {
              Write-Host "MS-MPI download attempt $i failed: $($_.Exception.Message)"
              Start-Sleep -Seconds ($i * 10)
            }
          }
          if (-not $ok) { throw "MS-MPI download failed after 5 attempts" }
          Start-Process -FilePath $exe -ArgumentList '-unattend' -Wait
          $dll = Join-Path $env:SystemRoot 'System32\msmpi.dll'
          if (-not (Test-Path $dll)) { throw "msmpi.dll not found after install" }
          Write-Host "MS-MPI runtime: $((Get-Item $dll).VersionInfo.FileVersion)"

      # Override the C:/msys64/... hardcoded developer paths in the base
      # preset with the runner's actual MSYS2 install prefix.
      - name: CMake configure
        run: |
          export PATH="/ucrt64/bin:/usr/bin:$PATH"
          which gfortran
          gfortran --version | head -1
          PREFIX=$(cygpath -m "$MINGW_PREFIX")
          echo "MSYS2 UCRT64 prefix (Windows form): $PREFIX"
          cmake --preset "$PRESET" \
            -DCMAKE_MAKE_PROGRAM="$PREFIX/bin/ninja.exe"                    \
            -DCMAKE_C_COMPILER="$PREFIX/bin/gcc.exe"                        \
            -DCMAKE_CXX_COMPILER="$PREFIX/bin/g++.exe"                      \
            -DCMAKE_Fortran_COMPILER="$PREFIX/bin/gfortran.exe"             \
            -DCMAKE_PREFIX_PATH="$PREFIX"                                   \
            -DHDF5_ROOT="$PREFIX"                                           \
            -DHDF5_DIR="$PREFIX/lib/cmake/hdf5"                             \
            -DHDF5_Fortran_INCLUDE_DIR="$PREFIX/include"                    \
            -DLAPACK_ROOT="$PREFIX"                                         \
            -DMPI_HOME="$PREFIX"                                            \
            -DMPI_C_COMPILER="$PREFIX/bin/mpicc"                            \
            -DMPI_CXX_COMPILER="$PREFIX/bin/mpicxx"                         \
            -DMPI_Fortran_COMPILER="$PREFIX/bin/mpifort"

      - name: Build piclas2vtk target
        run: |
          export PATH="/ucrt64/bin:/usr/bin:$PATH"
          cmake --build "$BUILD_DIR" --target piclas2vtk -j

      - name: Verify binary exists
        shell: cmd
        run: |
          dir %BUILD_DIR%\bin
          if not exist %BUILD_DIR%\bin\piclas2vtk.exe (exit /b 1)

      - name: Bundle runtime DLLs
        run: |
          export PATH="/ucrt64/bin:/usr/bin:$PATH"
          bash .github/scripts/bundle_dlls.sh \
            "$BUILD_DIR/bin/piclas2vtk.exe" \
            dist/piclas2vtk

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: dist/piclas2vtk
          if-no-files-found: error
          retention-days: 14
