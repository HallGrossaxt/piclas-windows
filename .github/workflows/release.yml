name: Release

# Build the Windows tools and publish a GitHub Release with two self-contained,
# runnable portable ZIPs — a CPU-only (no-GPU) build, which is the recommended
# download for almost everyone (incl. all DSMC cases since the GPU only speeds up
# the particle push, not the CPU-bound DSMC collisions), and a GPU build. Each ZIP
# has a per-tool folder (piclas-win/, piclas2vtk/, superB/), each holding its
# executable plus the UCRT64 + MS-MPI runtime DLLs it needs (incl. bundled
# msmpi.dll), plus a ready-to-run example/ case — so it runs on a clean Windows
# box with NEITHER MSYS2 NOR MS-MPI installed (single-process; parallel mpiexec
# still needs the full MS-MPI runtime). (Each tool ships its own libpiclas.dll
# built from a different preset, so they cannot share a single bin/.)
#
# Trigger: push a version tag, e.g.
#   git tag v1.1 && git push origin v1.1
# or run manually (workflow_dispatch) and supply the tag to release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.1). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # --- Reuse the build workflows. Each bundles its full UCRT64 runtime DLL
  #     closure + the redistributable msmpi.dll, and uploads a runnable bundle. ---
  # GPU bundle: piclas-win (GPU) + piclas2vtk + superB  -> piclas-win-<TAG>-win64.zip
  build-piclas:
    uses: ./.github/workflows/build-dsmc-gpu-mpi.yml
  build-piclas2vtk:
    uses: ./.github/workflows/build-piclas2vtk.yml
  build-superb:
    uses: ./.github/workflows/build-superb.yml

  # PIC-MC bundle: poisson + Boris-Leapfrog + PARALLEL PETSc (MS-MPI) + superB,
  # with piclas2vtk + superB built from the same preset (shared libpiclas.dll)
  # -> piclas-win-picmc-<TAG>-win64.zip
  build-picmc:
    uses: ./.github/workflows/build-picmc-petsc.yml

  # CPU-only fallback bundle -> piclas-win-nogpu-<TAG>-win64.zip
  # Only the solver is rebuilt without GPU (cpu_only=true, no CUDA dll) for machines
  # the GPU dll can't run on; piclas2vtk + superB are reused from above.
  build-piclas-nogpu:
    uses: ./.github/workflows/build-dsmc-gpu-mpi.yml
    with:
      cpu_only: true
      preset: windows-maxwell-dsmc-release-mpi
      build_dir: build-maxwell-dsmc-release-mpi
      artifact_name: piclas-win-nogpu-win64

  release:
    name: Package and publish release
    needs:
      - build-piclas
      - build-piclas2vtk
      - build-superb
      - build-picmc
      - build-piclas-nogpu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for LICENCE / version)
        uses: actions/checkout@v4

      - name: Download all build bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble portable ZIPs + checksums
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "Releasing tag: $TAG"
          mkdir -p out

          # License file may be spelled LICENCE.md or LICENSE.
          LIC=""
          for f in LICENCE.md LICENSE LICENSE.md; do [ -f "$f" ] && LIC="$f" && break; done

          # Build one consolidated, self-contained ZIP from three tool bundles.
          #   $1 = package dir name (also the zip basename)
          #   $2 = mode: 'gpu' or 'nogpu' (controls README wording)
          #   $3 $4 $5 = "<subdir>=<artifact-dir>" for piclas-win / piclas2vtk / superB
          #
          # Each tool gets its OWN subfolder. The three tools are built from
          # different CMake presets and each ships its own libpiclas.dll (and the
          # GPU build also libpiclasGPU.dll), which are NOT interchangeable, so a
          # single shared bin/ is not possible — keep each bundle self-contained
          # in its own directory next to the shared example/.
          build_bundle() {
            local pkg="$1" mode="$2"; shift 2
            rm -rf "$pkg"; mkdir -p "$pkg"
            for spec in "$@"; do
              local sub="${spec%%=*}" src="${spec#*=}"
              echo "  $src -> $pkg/$sub"
              mkdir -p "$pkg/$sub"
              cp -a "$src"/. "$pkg/$sub/"
            done

            test -f "$pkg/piclas-win/piclas-win.exe" || { echo "ERROR: missing piclas-win.exe in $pkg"; exit 1; }
            test -f "$pkg/piclas2vtk/piclas2vtk.exe" || { echo "ERROR: missing piclas2vtk.exe in $pkg"; exit 1; }
            test -f "$pkg/superB/superB.exe"         || { echo "ERROR: missing superB.exe in $pkg"; exit 1; }

            [ -n "$LIC" ] && cp -f "$LIC" "$pkg/"

            local solver gpu_note
            if [ "$mode" = nogpu ]; then
              solver="DSMC + MPI solver (CPU-only, no GPU)"
              gpu_note=$'RECOMMENDED build for almost everyone, including all DSMC cases. CPU-only (no\nCUDA, no GPU DLL); no NVIDIA driver required.'
            else
              solver="DSMC + MPI + GPU solver"
              gpu_note=$'NOT the recommended download for most users -- prefer piclas-win-nogpu-'"$TAG"$'-win64.zip.\nThe GPU only accelerates the particle push; DSMC runtime is dominated by CPU-side\ncollisions, so this build gives NO meaningful speedup for the DSMC solver shipped here.\nGPU push acceleration is currently only worthwhile for PIC/Poisson field workloads.\nNeeds an NVIDIA driver; falls back to CPU if none is present.'
            fi
            local mpi_note=$'Self-contained MPI build: msmpi.dll is bundled, so SINGLE-PROCESS runs work on a\nmachine with NO Microsoft MPI installed. Parallel runs (mpiexec -n N ...) need the\nfull Microsoft MPI runtime (install msmpisetup.exe).'
            printf '%s\n' \
              "piclas-win — unofficial Windows port of PICLas  (release $TAG)" \
              "" \
              "Self-contained: each tool has its own folder with the executable plus the" \
              "UCRT64 + MS-MPI runtime DLLs it needs, so they run on a clean Windows 10/11" \
              "x64 box without an MSYS2 or MS-MPI install." \
              "" \
              "  piclas-win\\piclas-win.exe   $solver" \
              "  piclas2vtk\\piclas2vtk.exe   HDF5 (State / DSMCState / PartStateBoundary) -> VTK for ParaView" \
              "  superB\\superB.exe           magnetic-field (B-field) POSTI pre-processor" \
              "" \
              "$mpi_note" \
              "" \
              "$gpu_note" \
              "" \
              "example/  ready-to-run DSMC 70deg-cone 2D case (mesh pre-converted):" \
              "    cd example" \
              "    ..\\piclas-win\\piclas-win.exe parameter.ini DSMC.ini" \
              "    ..\\piclas2vtk\\piclas2vtk.exe <State-file>.h5      (convert output for ParaView)" \
              "" \
              "Source code and license (GPLv3): https://github.com/HallGrossaxt/piclas-windows" \
              > "$pkg/README.txt"

            # DSMC 70deg cone 2D example: parameter.ini + DSMC.ini + the pre-converted
            # CGNS 5-BC mesh (no HOPR needed by the end user); reference/ keeps the
            # source geometry + hopr_cgns.ini so the mesh can be regenerated.
            local EX="tutorials/dsmc-cone-2D"
            mkdir -p "$pkg/example/reference"
            cp "$EX/parameter.ini" "$EX/DSMC.ini" "$EX/70degCone_2D_mesh.h5" "$EX/README.md" "$pkg/example/"
            cp "$EX/70degCone_2DSurf.geo" "$EX/70degCone_2DSurf.step" \
               "$EX/70degCone_2D_mesh.cgns" "$EX/hopr_cgns.ini" "$pkg/example/reference/"

            ( cd "$pkg" && zip -qr "$GITHUB_WORKSPACE/out/${pkg}.zip" . )
            echo "  packaged ${pkg}.zip"
          }

          # GPU variant
          build_bundle "piclas-win-${TAG}-win64" gpu \
            "piclas-win=artifacts/piclas-win-win64" \
            "piclas2vtk=artifacts/piclas2vtk-win64" \
            "superB=artifacts/superB-win64"

          # CPU-only (no-GPU) fallback variant — reuses the same piclas2vtk + superB
          build_bundle "piclas-win-nogpu-${TAG}-win64" nogpu \
            "piclas-win=artifacts/piclas-win-nogpu-win64" \
            "piclas2vtk=artifacts/piclas2vtk-win64" \
            "superB=artifacts/superB-win64"

          # PIC-MC variant: poisson + Boris-Leapfrog + parallel PETSc + superB.
          # Its artifact already holds all three tools sharing ONE libpiclas.dll
          # (built from a single preset), so they ship together in bin/ rather
          # than in per-tool folders.
          PICMC="piclas-win-picmc-${TAG}-win64"
          rm -rf "$PICMC"; mkdir -p "$PICMC/bin"
          cp -a artifacts/piclas-win-picmc-win64/. "$PICMC/bin/"
          test -f "$PICMC/bin/piclas-win.exe" || { echo "ERROR: missing piclas-win.exe in picmc"; exit 1; }
          test -f "$PICMC/bin/piclas2vtk.exe" || { echo "ERROR: missing piclas2vtk.exe in picmc"; exit 1; }
          test -f "$PICMC/bin/superB.exe"     || { echo "ERROR: missing superB.exe in picmc"; exit 1; }
          [ -n "$LIC" ] && cp -f "$LIC" "$PICMC/"
          printf '%s\n' \
            "piclas-win — PIC-MC + PETSc build  (release $TAG)" \
            "" \
            "Electrostatic particle-in-cell + Monte-Carlo-Collision solver: poisson" \
            "(HDG) + Boris-Leapfrog, linked against a PARALLEL PETSc built --with-mpi" \
            "against MS-MPI, so the PETSc/HDG field solve — including floating" \
            "conductors (FPC) — runs at MPI>1. GAMG algebraic multigrid is available" \
            "at runtime via PrecondType=4 (see the guide). superB's B-field path is" \
            "compiled in." \
            "" \
            "  bin\\piclas-win.exe   PIC + Poisson (HDG/PETSc) + DSMC/MCC collisions" \
            "  bin\\piclas2vtk.exe   HDF5 State/DSMCState -> VTK for ParaView" \
            "  bin\\superB.exe       magnetic-field (B-field) POSTI pre-processor" \
            "  (all three share one libpiclas.dll)" \
            "" \
            "Self-contained: msmpi.dll + the UCRT64 runtime DLLs are bundled, so" \
            "SINGLE-PROCESS runs work with no MSYS2 / MS-MPI install. Parallel runs" \
            "(mpiexec -n N ...) need the full Microsoft MPI runtime (msmpisetup.exe)." \
            "" \
            "Example cases: see the pic-poisson-* tutorials in the source tree" \
            "(tutorials/pic-poisson-mcc-verification-parodi is a PIC-MCC benchmark)." \
            "A ready-to-run bundled PIC example is a planned follow-up." \
            "" \
            "Source and license (GPLv3): https://github.com/HallGrossaxt/piclas-windows" \
            > "$PICMC/README.txt"
          ( cd "$PICMC" && zip -qr "$GITHUB_WORKSPACE/out/${PICMC}.zip" . )
          echo "  packaged ${PICMC}.zip"

          ( cd out && sha256sum *.zip > SHA256SUMS.txt )
          echo "=== release assets ==="
          ls -l out

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: piclas-win ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          body: |
            **piclas-win ${{ inputs.tag || github.ref_name }}** — unofficial Windows port of PICLas.

            Portable, self-contained Windows x64 downloads (MSYS2 UCRT64 toolchain). Each ZIP has a
            per-tool folder (`piclas-win/`, `piclas2vtk/`, `superB/`), each with its executable plus
            the UCRT64 **and MS-MPI** runtime DLLs it needs — so they run on a clean Windows 10/11
            machine **with neither MSYS2 nor MS-MPI installed**. Pick **one**:

            | Asset | For | Contents |
            |-------|-----|----------|
            | `piclas-win-nogpu-*-win64.zip` | **DSMC — recommended start here.** Best choice for rarefied-gas / DSMC cases | Three tools, solver built **CPU-only (no CUDA/GPU dll)**, each self-contained, plus ready-to-run `example/` |
            | `piclas-win-picmc-*-win64.zip` | **Electrostatic plasma / PIC** — magnetrons, Hall/ion thrusters, CCP, and MCC | poisson (HDG) + Boris-Leapfrog + **parallel PETSc** (floating conductors / FPC + **GAMG**) + `superB`, all three tools sharing one `libpiclas.dll` in `bin/` |
            | `piclas-win-*-win64.zip` | Only if you have a specific reason to want the DSMC GPU push (see note below) | `piclas-win/` (DSMC + MPI + **GPU**), `piclas2vtk/` (HDF5 → VTK), `superB/` (B-field POSTI), each self-contained, plus ready-to-run `example/` |

            **Which build should I download?**
            - **DSMC / rarefied gas → `-nogpu`.** **Electrostatic plasma / particle-in-cell → `-picmc`** (the new PIC + Poisson + Monte-Carlo-Collision build with parallel PETSc, so the HDG field solve and floating conductors run at MPI>1).
            - **The GPU (`piclas-win-*`) build is rarely worth it.** It accelerates only the particle **push**; DSMC runtime is dominated by **CPU-side** collision/pairing, tracking and sampling, so the GPU gives **no meaningful speedup for DSMC**. It needs an NVIDIA driver and adds overhead with no payback for the DSMC binary shipped here.

            **Runtime notes**
            - **No install needed for single-process runs:** `msmpi.dll` is bundled, so the tools run on a machine with no Microsoft MPI installed. Parallel runs (`mpiexec -n N`) still need the full MS-MPI runtime (`msmpisetup.exe`).

            **Example:** unzip, then `cd example && ..\piclas-win\piclas-win.exe parameter.ini DSMC.ini`
            (see its `README.md`); convert output with `..\piclas2vtk\piclas2vtk.exe <State>.h5`. ~30 min single-process.

            Verify downloads against `SHA256SUMS.txt`. Source and license (GPLv3) are in this repository.
          files: |
            out/*.zip
            out/SHA256SUMS.txt
          fail_on_unmatched_files: true
