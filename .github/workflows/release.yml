name: Release

# Build the Windows tools and publish a GitHub Release with two self-contained,
# runnable portable ZIPs — an MPI build and a no-MPI (serial) build. Each ZIP has
# a shared bin/ holding all three tool executables (piclas-win, piclas2vtk,
# superB) plus a single copy of their common UCRT64 runtime DLL closure, plus a
# ready-to-run example/ case — so it runs on a clean Windows box without an MSYS2
# install. The no-MPI ZIP additionally needs no Microsoft MPI runtime installed.
#
# Trigger: push a version tag, e.g.
#   git tag v1.1 && git push origin v1.1
# or run manually (workflow_dispatch) and supply the tag to release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.1). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # --- Reuse the existing build workflows (they bundle the runtime DLLs and
  #     upload the runnable bundle as an artifact). ---
  # --- MPI variant (default presets) -> piclas-win-<TAG>-win64.zip ---
  build-piclas:
    uses: ./.github/workflows/build-dsmc-gpu-mpi.yml
  build-piclas2vtk:
    uses: ./.github/workflows/build-piclas2vtk.yml
  build-superb:
    uses: ./.github/workflows/build-superb.yml

  # --- No-MPI (serial) variant -> piclas-win-nompi-<TAG>-win64.zip ---
  # Same tools built against the serial (LIBS_USE_MPI=OFF) presets, for users
  # who have no Microsoft MPI runtime installed. DSMC + GPU is retained.
  build-piclas-nompi:
    uses: ./.github/workflows/build-dsmc-gpu-mpi.yml
    with:
      preset: windows-maxwell-dsmc-release-gpu
      build_dir: build-maxwell-dsmc-release-gpu
      artifact_name: piclas-win-nompi-win64
  build-piclas2vtk-nompi:
    uses: ./.github/workflows/build-piclas2vtk.yml
    with:
      preset: windows-maxwell-dsmc-release-posti
      build_dir: build-maxwell-dsmc-release-posti
      artifact_name: piclas2vtk-nompi-win64
  build-superb-nompi:
    uses: ./.github/workflows/build-superb.yml
    with:
      preset: windows-maxwell-superb
      build_dir: build-maxwell-superb
      artifact_name: superB-nompi-win64

  release:
    name: Package and publish release
    needs:
      - build-piclas
      - build-piclas2vtk
      - build-superb
      - build-piclas-nompi
      - build-piclas2vtk-nompi
      - build-superb-nompi
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for LICENCE / version)
        uses: actions/checkout@v4

      - name: Download all build bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble portable ZIPs + checksums
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "Releasing tag: $TAG"
          mkdir -p out

          # License file may be spelled LICENCE.md or LICENSE.
          LIC=""
          for f in LICENCE.md LICENSE LICENSE.md; do [ -f "$f" ] && LIC="$f" && break; done

          # Merge one tool bundle into a destination bin/, deduping byte-identical
          # files. Each per-tool bundle (from bundle_dlls.sh) carries its own full
          # UCRT64 runtime DLL closure; those DLLs come from the same MSYS2
          # toolchain on the same runner and are byte-identical across tools, so we
          # keep ONE copy. Tool executables are unique. A same-name-but-different-
          # content file cannot coexist in a flat bin/ (Windows loader), so fail
          # loudly rather than ship a broken bundle.
          merge_into() {
            local destbin="$1" src="$2"
            for f in "$src"/*; do
              [ -f "$f" ] || continue
              local base; base="$(basename "$f")"
              local dst="$destbin/$base"
              if [ ! -e "$dst" ]; then
                cp -f "$f" "$dst"
              elif ! cmp -s "$f" "$dst"; then
                echo "ERROR: '$base' differs between tool bundles; cannot merge into a single bin/." >&2
                echo "       conflicting source: $f" >&2
                exit 1
              fi
            done
          }

          # Build one consolidated, self-contained ZIP from three tool bundles.
          #   $1 = package dir name (also the zip basename)
          #   $2 = mode: 'mpi' or 'nompi' (controls README wording)
          #   $3 $4 $5 = the three artifact dirs (piclas, piclas2vtk, superB)
          build_bundle() {
            local pkg="$1" mode="$2"; shift 2
            rm -rf "$pkg"; mkdir -p "$pkg/bin"
            for d in "$@"; do
              echo "  merging bundle: $d -> $pkg/bin"
              merge_into "$pkg/bin" "$d"
            done

            for exe in piclas-win.exe piclas2vtk.exe superB.exe; do
              test -f "$pkg/bin/$exe" || { echo "ERROR: missing $exe in $pkg"; exit 1; }
            done
            echo "  $pkg/bin: $(ls -1 "$pkg/bin" | wc -l) files"

            [ -n "$LIC" ] && cp -f "$LIC" "$pkg/"

            local solver mpi_note
            if [ "$mode" = nompi ]; then
              solver="DSMC + GPU solver (no MPI)"
              mpi_note=$'This build is compiled WITHOUT MPI: it runs single-process only and needs\nno Microsoft MPI installation. (For multi-process mpiexec runs, use the\npiclas-win-'"$TAG"$'-win64.zip build instead.)'
            else
              solver="DSMC + MPI + GPU solver"
              mpi_note=$'These are MPI builds. Parallel runs (mpiexec -n N ...) require the Microsoft\nMPI runtime — install msmpisetup.exe from Microsoft. Single-process runs work\nwithout it.'
            fi
            printf '%s\n' \
              "piclas-win — unofficial Windows port of PICLas  (release $TAG)" \
              "" \
              "Self-contained: bin/ holds all three tools plus the shared UCRT64 runtime" \
              "DLLs, so they run on a clean Windows 10/11 x64 box without an MSYS2 install." \
              "" \
              "  bin/piclas-win.exe   $solver" \
              "  bin/piclas2vtk.exe   HDF5 (State / DSMCState / PartStateBoundary) -> VTK for ParaView" \
              "  bin/superB.exe       magnetic-field (B-field) POSTI pre-processor" \
              "" \
              "$mpi_note" \
              "GPU runs require an NVIDIA driver (no CUDA Toolkit needed at runtime)." \
              "" \
              "example/  ready-to-run DSMC 70deg-cone 2D case (mesh pre-converted):" \
              "    cd example" \
              "    ..\\bin\\piclas-win.exe parameter.ini DSMC.ini" \
              "    ..\\bin\\piclas2vtk.exe <State-file>.h5      (convert output for ParaView)" \
              "" \
              "Source code and license (GPLv3): https://github.com/HallGrossaxt/piclas-windows" \
              > "$pkg/README.txt"

            # DSMC 70deg cone 2D example: parameter.ini + DSMC.ini + the pre-converted
            # CGNS 5-BC mesh (no HOPR needed by the end user); reference/ keeps the
            # source geometry + hopr_cgns.ini so the mesh can be regenerated.
            local EX="tutorials/dsmc-cone-2D"
            mkdir -p "$pkg/example/reference"
            cp "$EX/parameter.ini" "$EX/DSMC.ini" "$EX/70degCone_2D_mesh.h5" "$EX/README.md" "$pkg/example/"
            cp "$EX/70degCone_2DSurf.geo" "$EX/70degCone_2DSurf.step" \
               "$EX/70degCone_2D_mesh.cgns" "$EX/hopr_cgns.ini" "$pkg/example/reference/"

            ( cd "$pkg" && zip -qr "$GITHUB_WORKSPACE/out/${pkg}.zip" . )
            echo "  packaged ${pkg}.zip"
          }

          # MPI variant (default presets)
          build_bundle "piclas-win-${TAG}-win64" mpi \
            artifacts/piclas-win-win64 artifacts/piclas2vtk-win64 artifacts/superB-win64

          # No-MPI (serial) variant
          build_bundle "piclas-win-nompi-${TAG}-win64" nompi \
            artifacts/piclas-win-nompi-win64 artifacts/piclas2vtk-nompi-win64 artifacts/superB-nompi-win64

          ( cd out && sha256sum *.zip > SHA256SUMS.txt )
          echo "=== release assets ==="
          ls -l out

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: piclas-win ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          body: |
            **piclas-win ${{ inputs.tag || github.ref_name }}** — unofficial Windows port of PICLas.

            Portable, self-contained Windows x64 downloads (MSYS2 UCRT64 toolchain). Each ZIP's `bin/`
            holds all three tools sharing a single copy of the runtime DLL closure, so they run on a
            clean Windows 10/11 machine **without installing MSYS2**. Pick **one**:

            | Asset | For | Contents |
            |-------|-----|----------|
            | `piclas-win-*-win64.zip` | Has Microsoft MPI (parallel `mpiexec` runs) | `bin/piclas-win.exe` (DSMC + MPI + GPU), `bin/piclas2vtk.exe` (HDF5 → VTK), `bin/superB.exe` (B-field POSTI), shared runtime DLLs, ready-to-run `example/` |
            | `piclas-win-nompi-*-win64.zip` | **No MPI installed** (single-process only) | Same three tools built **without MPI** (DSMC + GPU), shared runtime DLLs, ready-to-run `example/` |

            **Runtime notes**
            - The `nompi` build runs single-process only and needs **no** MS-MPI install. The MPI build's parallel runs (`mpiexec -n N`) need the Microsoft MPI runtime (`msmpisetup.exe`); its single-process runs work as-is.
            - **GPU** needs an NVIDIA driver (no CUDA Toolkit at runtime) in both builds.

            **Example:** unzip, then `cd example && ..\bin\piclas-win.exe parameter.ini DSMC.ini`
            (see its `README.md`); convert output with `..\bin\piclas2vtk.exe <State>.h5`. ~30 min single-process.

            Verify downloads against `SHA256SUMS.txt`. Source and license (GPLv3) are in this repository.
          files: |
            out/*.zip
            out/SHA256SUMS.txt
          fail_on_unmatched_files: true
